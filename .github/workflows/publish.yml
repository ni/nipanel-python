name: Publish nipanel

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: The environment to publish to.
        default: 'none'
        required: true
        type: choice
        options:
          - none
          - pypi
          - testpypi

env:
  dist-artifact-name: nipanel-distribution-packages
  environment: ${{ github.event_name == 'release' && 'pypi' || inputs.environment }}
  environment-info: |
    {
      "pypi": {
        "base-url": "https://pypi.org",
        "upload-url": "https://upload.pypi.org/legacy/"
      },
      "testpypi": {
        "base-url": "https://test.pypi.org",
        "upload-url": "https://test.pypi.org/legacy/"
      }
    }

jobs:
  check_nipanel:
    name: Check nipanel
    uses: ./.github/workflows/check_nipanel.yml
  check_docs:
    name: Check docs
    uses: ./.github/workflows/check_docs.yml
  build_nipanel:
    name: Build nipanel
    runs-on: ubuntu-latest
    needs: [check_nipanel, check_docs]
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: ni/python-actions/setup-python@a2894c635a2cba635a1086c1f89796fec2c52f74 # 0.7.2
      - name: Set up Poetry
        uses: ni/python-actions/setup-poetry@a2894c635a2cba635a1086c1f89796fec2c52f74 # 0.7.2
      - name: Check project version
        if: github.event_name == 'release'
        uses: ni/python-actions/check-project-version@a2894c635a2cba635a1086c1f89796fec2c52f74 # 0.7.2
      - name: Build distribution packages
        run: poetry build
      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ env.dist-artifact-name }}
          path: dist/*
  publish_to_pypi:
    name: Publish nipanel to PyPI
    if: github.event_name == 'release' || inputs.environment != 'none'
    runs-on: ubuntu-latest
    needs: [build_nipanel]
    environment:
      # This logic is duplicated because `name` doesn't support the `env` context.
      name: ${{ github.event_name == 'release' && 'pypi' || inputs.environment }}
      url: ${{ fromJson(env.environment-info)[env.environment].base-url }}/p/nipanel
    permissions:
      id-token: write
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        name: ${{ env.dist-artifact-name }}
        path: dist/
    - run: ls -lR
    - name: Upload to ${{ env.environment }}
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        repository-url: ${{ fromJson(env.environment-info)[env.environment].upload-url }}
  update_version:
    name: Update nipanel version
    runs-on: ubuntu-latest
    needs: [build_nipanel]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: ni/python-actions/setup-python@a2894c635a2cba635a1086c1f89796fec2c52f74 # 0.7.2
      - name: Set up Poetry
        uses: ni/python-actions/setup-poetry@a2894c635a2cba635a1086c1f89796fec2c52f74 # 0.7.2
      - name: Update project version
        uses: ni/python-actions/update-project-version@a2894c635a2cba635a1086c1f89796fec2c52f74 # 0.7.2